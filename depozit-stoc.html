<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DepozitStoc – Gestiune Stoc</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:13px;background:#f1f5f9;color:#1e293b}
#app{display:flex;height:100vh;overflow:hidden}
#sb{width:205px;background:#0f172a;display:flex;flex-direction:column;flex-shrink:0}
#main{flex:1;overflow-y:auto;padding:18px}
.card{background:#fff;border:1px solid #e2e8f0;border-radius:12px;margin-bottom:13px}
.ch{padding:11px 15px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between}
.ct{font-size:13px;font-weight:600;color:#1e293b}
.cb{padding:15px}
.th{padding:7px 10px;text-align:left;font-size:10px;font-weight:600;color:#64748b;border-bottom:1px solid #f1f5f9;background:#f8fafc;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.td{padding:8px 10px;border-bottom:1px solid #f8fafc;color:#334155;vertical-align:middle}
tr:last-child .td{border-bottom:none}
tr:hover .td{background:#fafafa}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:7px;border:1px solid #cbd5e1;background:#fff;cursor:pointer;font-size:12px;color:#334155;font-family:inherit}
.btn:hover{background:#f8fafc}
.btnP{background:#2563eb;color:#fff;border:none;padding:7px 14px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:600;font-family:inherit}
.btnP:hover{background:#1d4ed8}
.inp{width:100%;padding:7px 9px;border-radius:7px;border:1px solid #cbd5e1;background:#fff;color:#1e293b;font-size:12px;outline:none;box-sizing:border-box;font-family:inherit}
.inp:focus{border-color:#2563eb;box-shadow:0 0 0 3px #dbeafe}
.lbl{font-size:11px;font-weight:600;color:#475569;margin-bottom:3px;display:block}
.fg{margin-bottom:11px}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:#f8fafc;border-radius:9px;padding:11px 13px;border:1px solid #e2e8f0}
.badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600}
.ok{padding:8px 11px;border-radius:7px;margin-bottom:11px;font-size:12px;background:#dcfce7;color:#166534;border:1px solid #bbf7d0}
.err{padding:8px 11px;border-radius:7px;margin-bottom:11px;font-size:12px;background:#fee2e2;color:#991b1b;border:1px solid #fecaca}
.warn{padding:8px 11px;border-radius:7px;margin-bottom:11px;font-size:12px;background:#fff7ed;color:#9a3412;border:1px solid #fed7aa}
.ph{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.tbl-w{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
.ni{display:flex;align-items:center;gap:7px;padding:6px 8px;border-radius:6px;cursor:pointer;margin-bottom:1px;font-size:12px;color:#94a3b8;transition:all .1s}
.ni.a{background:#1d4ed8;color:#e0e7ff;font-weight:600}
.ni:hover:not(.a){background:rgba(255,255,255,.06);color:#cbd5e1}
</style>
</head>
<body>
<div id="app">
  <div id="sb">
    <div style="padding:14px 12px 10px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:8px">
      <div style="width:28px;height:28px;background:#2563eb;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0">D</div>
      <div><div style="font-size:13px;font-weight:600;color:#f1f5f9">DepozitStoc</div><div style="font-size:10px;color:#64748b">Gestiune stoc depozit</div></div>
    </div>
    <div id="nav" style="flex:1;padding:8px;overflow-y:auto"></div>
    <div style="padding:8px 12px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:#334155">v1.0 · NetSell Pro</div>
  </div>
  <div id="main"></div>
</div>
<script>
var P=[],L=[],Loc=[],C=[],M=[],pg='dash';
var uid=function(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);};
var today=function(){return new Date().toISOString().split('T')[0];};
var dPlus=function(n){return new Date(Date.now()+n*86400000).toISOString().split('T')[0];};
var dFmt=function(d){if(!d)return'—';var p=d.split('-');return p[2]+'.'+p[1]+'.'+p[0];};
var dLeft=function(d){if(!d)return null;return Math.round((new Date(d).setHours(0,0,0,0)-new Date().setHours(0,0,0,0))/86400000);};
var fmtBx=function(q,u){if(!q||q<=0)return'0 buc';if(!u)return q+' buc';var b=Math.floor(q/u),r=q%u;return b===0?r+' buc':r===0?b+(b>1?' baxuri':' bax'):b+(b>1?' baxuri':' bax')+' + '+r+' buc';};
var genDoc=function(type){var pf={receptie:'REC',livrare:'LIV',transfer:'TRF',ajustare:'AJU'}[type]||'DOC';var yr=new Date().getFullYear();var n=M.filter(function(m){return m.dn&&m.dn.indexOf(pf+'-'+yr+'-')===0;}).length+1;return pf+'-'+yr+'-'+('000'+n).slice(-4);};
var TYPES={receptie:'Recepție',livrare:'Livrare',transfer:'Transfer',ajustare:'Ajustare'};
var TC={receptie:'#dcfce7:#166534',livrare:'#dbeafe:#1e40af',transfer:'#f3e8ff:#6b21a8',ajustare:'#fff7ed:#9a3412'};
var eSt=function(d){if(d===null)return'';if(d<0||d<=30)return'background:#fee2e2;color:#991b1b';if(d<=60)return'background:#fff7ed;color:#9a3412';if(d<=90)return'background:#fef9c3;color:#854d0e';return'background:#dcfce7;color:#166534';};
var eLbl=function(d){if(d===null)return'—';if(d<0)return'Expirat '+Math.abs(d)+'z';if(d===0)return'Azi!';return d+' zile';};
var badge=function(bg,c,t){return'<span class="badge" style="background:'+bg+';color:'+c+'">'+t+'</span>';};
var tbadge=function(t){var p=(TC[t]||'#f1f5f9:#64748b').split(':');return badge(p[0],p[1],TYPES[t]||t);};
var expBadge=function(d){var dl=dLeft(d);return'<span class="badge" style="'+eSt(dl)+';padding:2px 8px">'+eLbl(dl)+'</span>';};
var lotStock=function(lid,locid){return M.filter(function(m){return m.lid===lid&&(locid===undefined||m.locid===locid);}).reduce(function(s,m){return s+m.q;},0);};
var prodStock=function(pid){return M.filter(function(m){return m.pid===pid;}).reduce(function(s,m){return s+m.q;},0);};
var lotsWS=function(){return L.map(function(l){return Object.assign({},l,{stock:lotStock(l.id),prod:P.find(function(p){return p.id===l.pid;})});}).filter(function(l){return l.stock>0;}).sort(function(a,b){return new Date(a.ed)-new Date(b.ed);});};
var allLots=function(){return L.map(function(l){return Object.assign({},l,{stock:lotStock(l.id),prod:P.find(function(p){return p.id===l.pid;})});}).sort(function(a,b){return new Date(a.ed)-new Date(b.ed);});};
var rMoves=function(){return M.slice().sort(function(a,b){return new Date(b.ca)-new Date(a.ca);}).slice(0,300).map(function(m){return Object.assign({},m,{lot:L.find(function(l){return l.id===m.lid;}),prod:P.find(function(p){return p.id===m.pid;}),loc:Loc.find(function(l){return l.id===m.locid;}),cli:C.find(function(c){return c.id===m.cid;})});});};
function saveData(){try{localStorage.setItem('ds_P',JSON.stringify(P));localStorage.setItem('ds_L',JSON.stringify(L));localStorage.setItem('ds_Loc',JSON.stringify(Loc));localStorage.setItem('ds_C',JSON.stringify(C));localStorage.setItem('ds_M',JSON.stringify(M));}catch(e){}}
function loadData(){
  try{var p=localStorage.getItem('ds_P');if(p&&JSON.parse(p).length>0){P=JSON.parse(p);L=JSON.parse(localStorage.getItem('ds_L')||'[]');Loc=JSON.parse(localStorage.getItem('ds_Loc')||'[]');C=JSON.parse(localStorage.getItem('ds_C')||'[]');M=JSON.parse(localStorage.getItem('ds_M')||'[]');render();return;}}catch(e){}
  makeSeed();render();
}
function makeSeed(){
  P=[{id:'p1',code:'SKU-A',name:'Produs Demo A',upb:10,status:'active'},{id:'p2',code:'SKU-B',name:'Produs Demo B',upb:12,status:'active'}];
  Loc=[{id:'l1',name:'Depozit Principal',type:'depozit',address:'',contact:'',phone:''},{id:'l2',name:'Punct Descărcare',type:'punct_descarcare',address:'',contact:'',phone:''},{id:'l3',name:'Cross-dock',type:'cross_dock',address:'',contact:'',phone:''}];
  C=[{id:'c1',name:'Client A',type:'client_final',address:'',contact:'',phone:''},{id:'c2',name:'Distribuitor B',type:'distribuitor',address:'',contact:'',phone:''},{id:'c3',name:'Client C',type:'client_final',address:'',contact:'',phone:''}];
  var now=new Date().toISOString();
  L=[{id:'lt1',code:'LOT-A-001',pid:'p1',pd:'2026-01-10',ed:dPlus(60),iq:2400,status:'activ'},{id:'lt2',code:'LOT-A-002',pid:'p1',pd:'2026-02-05',ed:dPlus(120),iq:1800,status:'activ'},{id:'lt3',code:'LOT-A-003',pid:'p1',pd:'2026-03-01',ed:dPlus(20),iq:600,status:'activ'},{id:'lt4',code:'LOT-B-001',pid:'p2',pd:'2026-01-15',ed:dPlus(90),iq:1440,status:'activ'},{id:'lt5',code:'LOT-B-002',pid:'p2',pd:'2026-02-20',ed:dPlus(180),iq:960,status:'activ'}];
  M=[{id:uid(),dn:'REC-2026-0001',dd:dPlus(-2),t:'receptie',lid:'lt1',pid:'p1',locid:'l1',cid:null,q:2400,notes:'',un:'admin',ca:now},{id:uid(),dn:'REC-2026-0002',dd:dPlus(-2),t:'receptie',lid:'lt2',pid:'p1',locid:'l1',cid:null,q:1800,notes:'',un:'admin',ca:now},{id:uid(),dn:'REC-2026-0003',dd:dPlus(-2),t:'receptie',lid:'lt3',pid:'p1',locid:'l2',cid:null,q:600,notes:'',un:'operator',ca:now},{id:uid(),dn:'REC-2026-0004',dd:dPlus(-2),t:'receptie',lid:'lt4',pid:'p2',locid:'l1',cid:null,q:1440,notes:'',un:'admin',ca:now},{id:uid(),dn:'REC-2026-0005',dd:dPlus(-1),t:'receptie',lid:'lt5',pid:'p2',locid:'l1',cid:null,q:960,notes:'',un:'operator',ca:now},{id:uid(),dn:'LIV-2026-0001',dd:dPlus(-1),t:'livrare',lid:'lt1',pid:'p1',locid:'l1',cid:'c1',q:-300,notes:'',un:'admin',ca:now},{id:uid(),dn:'LIV-2026-0002',dd:dPlus(-1),t:'livrare',lid:'lt4',pid:'p2',locid:'l1',cid:'c2',q:-120,notes:'',un:'admin',ca:now},{id:uid(),dn:'TRF-2026-0001',dd:today(),t:'transfer',lid:'lt2',pid:'p1',locid:'l1',cid:null,q:-400,notes:'',un:'admin',ca:now},{id:uid(),dn:'TRF-2026-0001',dd:today(),t:'transfer',lid:'lt2',pid:'p1',locid:'l3',cid:null,q:400,notes:'',un:'admin',ca:now},{id:uid(),dn:'AJU-2026-0001',dd:today(),t:'ajustare',lid:'lt5',pid:'p2',locid:'l1',cid:null,q:-12,notes:'Marfă deteriorată',ar:'Marfă deteriorată la descărcare',un:'admin',ca:now}];
  saveData();
}
function csvDl(rows,name){var csv=rows.map(function(r){return r.map(function(v){return'"'+(v===null||v===undefined?'':String(v)).replace(/"/g,'""')+'"';}).join(';');}).join('\n');var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download=name+'.csv';a.click();}
var NAV=[{g:'Principal',items:[{id:'dash',ic:'◈',l:'Dashboard'}]},{g:'Operațiuni',items:[{id:'rec',ic:'↓',l:'Recepție'},{id:'liv',ic:'↑',l:'Livrare'},{id:'trf',ic:'⇄',l:'Transfer'},{id:'adj',ic:'±',l:'Ajustare'}]},{g:'Evidență',items:[{id:'lots',ic:'≡',l:'Loturi'},{id:'hist',ic:'◷',l:'Istoric'},{id:'rep',ic:'▦',l:'Rapoarte'}]},{g:'Date',items:[{id:'prods',ic:'□',l:'Produse'},{id:'locs',ic:'⌂',l:'Locații'},{id:'clis',ic:'◎',l:'Clienți'}]}];
function buildNav(){document.getElementById('nav').innerHTML=NAV.map(function(g){return'<div style="font-size:9px;font-weight:600;color:#475569;text-transform:uppercase;letter-spacing:.08em;padding:8px 8px 3px">'+g.g+'</div>'+g.items.map(function(item){return'<div class="ni'+(pg===item.id?' a':'')+'" onclick="nav(\''+item.id+'\')"><span style="font-size:12px;opacity:.7">'+item.ic+'</span><span>'+item.l+'</span></div>';}).join('');}).join('');}
function nav(page){pg=page;render();}
function render(){buildNav();var pages={dash:renderDash,rec:renderRec,liv:renderLiv,trf:renderTrf,adj:renderAdj,lots:renderLots,hist:renderHist,rep:renderRep,prods:renderProds,locs:renderLocs,clis:renderClis};document.getElementById('main').innerHTML=(pages[pg]||renderDash)();}
function gv(id){var el=document.getElementById(id);return el?el.value:'';}
function se(id,v){var el=document.getElementById(id);if(el)el.value=v;}
function si(id,h){var el=document.getElementById(id);if(el)el.innerHTML=h;}
function qs(sel){var el=document.querySelector(sel);return el?el.value:'';}
function msg(h){si('frm-msg',h);}
function toggleEl(id){var el=document.getElementById(id);if(el)el.style.display=el.style.display==='none'?'block':'none';}
// DASHBOARD
function renderDash(){
  var pS=P.map(function(p){return Object.assign({},p,{stock:prodStock(p.id)});});
  var total=pS.reduce(function(s,p){return s+p.stock;},0);
  var lws=lotsWS();var exp30=lws.filter(function(l){var d=dLeft(l.ed);return d!==null&&d>=0&&d<=30;});var expd=lws.filter(function(l){var d=dLeft(l.ed);return d!==null&&d<0;});var rm=rMoves().slice(0,8);
  return'<div class="ph"><div><h1 style="font-size:18px;font-weight:700;margin:0">Dashboard</h1><p style="font-size:11px;color:#64748b;margin:2px 0 0">Stoc și activitate în timp real</p></div><div style="display:flex;gap:8px"><button class="btnP" onclick="toggleEl(\'pnl-st\')">📦 Stoc acum</button><button class="btn" onclick="toggleEl(\'pnl-dc\')">📋 Ultimele avize</button></div></div>'+
  (expd.length?'<div class="warn">⚠ '+expd.length+' lot'+(expd.length>1?'uri':'')+' EXPIRAT! Stoc: '+expd.reduce(function(s,l){return s+l.stock;},0)+' buc</div>':'')+
  (exp30.length?'<div class="warn">⚠ '+exp30.length+' lot'+(exp30.length>1?'uri':'')+' expiră în sub 30 zile: '+exp30.map(function(l){return l.code+' ('+dLeft(l.ed)+'z)';}).join(' · ')+'</div>':'')+
  '<div style="display:grid;grid-template-columns:repeat('+(2+pS.length)+',1fr);gap:10px;margin-bottom:14px">'+
  '<div class="sc"><div style="font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:3px">Total general</div><div style="font-size:22px;font-weight:700">'+total.toLocaleString()+'</div><div style="font-size:11px;color:#64748b">bucăți</div></div>'+
  pS.map(function(p){return'<div class="sc"><div style="font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:3px">'+p.code+'</div><div style="font-size:22px;font-weight:700">'+p.stock.toLocaleString()+'</div><div style="font-size:11px;color:#2563eb">'+fmtBx(p.stock,p.upb)+'</div></div>';}).join('')+
  '<div class="sc"'+(exp30.length?' style="background:#fff7ed"':'')+'><div style="font-size:10px;font-weight:600;color:#64748b;text-transform:uppercase;margin-bottom:3px">Expiră ≤30z</div><div style="font-size:22px;font-weight:700'+(exp30.length?';color:#c2410c':'')+'">'+exp30.length+'</div><div style="font-size:11px;color:#64748b">'+(exp30.length?'Atenție!':'OK')+'</div></div></div>'+
  '<div id="pnl-st" style="display:none" class="card"><div class="ch"><span class="ct">📦 Stoc curent – FEFO</span><button class="btn" onclick="toggleEl(\'pnl-st\')">× Închide</button></div><div class="tbl-w"><table><thead><tr><th class="th">Produs</th><th class="th">Lot</th><th class="th">Expirare</th><th class="th">Valabilitate</th><th class="th" style="text-align:right">Bucăți</th><th class="th" style="text-align:right">Baxuri</th></tr></thead><tbody>'+
  (lws.length?lws.map(function(l){return'<tr><td class="td"><div style="font-weight:600;font-size:12px">'+(l.prod?l.prod.name:'')+'</div><div style="font-size:10px;color:#64748b">'+(l.prod?l.prod.code:'')+'</div></td><td class="td" style="font-family:monospace;font-size:11px;font-weight:600">'+l.code+'</td><td class="td">'+dFmt(l.ed)+'</td><td class="td">'+expBadge(l.ed)+'</td><td class="td" style="text-align:right;font-weight:700">'+l.stock+'</td><td class="td" style="text-align:right;color:#2563eb;font-weight:600">'+fmtBx(l.stock,l.prod?l.prod.upb:1)+'</td></tr>';}).join(''):'<tr><td class="td" colspan="6" style="text-align:center;padding:24px;color:#64748b">Nu există stoc</td></tr>')+
  '</tbody></table></div></div>'+
  '<div id="pnl-dc" style="display:none" class="card"><div class="ch"><span class="ct">📋 Ultimele avize</span><button class="btn" onclick="toggleEl(\'pnl-dc\')">× Închide</button></div><div class="tbl-w"><table><thead><tr><th class="th">Document</th><th class="th">Data</th><th class="th">Tip</th><th class="th">Produs</th><th class="th">Lot</th><th class="th" style="text-align:right">Qty</th></tr></thead><tbody>'+
  rm.map(function(m){return'<tr><td class="td" style="font-family:monospace;font-size:10px;color:#2563eb;font-weight:600">'+m.dn+'</td><td class="td">'+dFmt(m.dd)+'</td><td class="td">'+tbadge(m.t)+'</td><td class="td" style="font-size:11px">'+(m.prod?m.prod.name:'')+'</td><td class="td" style="font-family:monospace;font-size:10px">'+(m.lot?m.lot.code:'')+'</td><td class="td" style="text-align:right;font-weight:600;color:'+(m.q<0?'#dc2626':'#16a34a')+'">'+(m.q>0?'+':'')+m.q+'</td></tr>';}).join('')+
  '</tbody></table></div></div>'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">'+
  '<div class="card"><div class="ch"><span class="ct">Stoc pe produs</span></div><div class="cb">'+pS.map(function(p){return'<div style="display:flex;align-items:center;gap:9px;padding:8px 0;border-bottom:1px solid #f1f5f9"><div style="width:32px;height:32px;border-radius:8px;background:#dbeafe;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#1e40af;flex-shrink:0">'+p.code.slice(-3)+'</div><div style="flex:1"><div style="font-weight:600;font-size:12px">'+p.name+'</div><div style="font-size:10px;color:#64748b">'+p.code+' · '+p.upb+' buc/bax</div></div><div style="text-align:right"><div style="font-weight:700">'+p.stock.toLocaleString()+' buc</div><div style="font-size:10px;color:#2563eb">'+fmtBx(p.stock,p.upb)+'</div></div></div>';}).join('')+'</div></div>'+
  '<div class="card"><div class="ch"><span class="ct">Ultimele mișcări</span></div><div>'+rm.map(function(m){return'<div style="display:flex;align-items:center;gap:8px;padding:7px 13px;border-bottom:1px solid #f8fafc">'+tbadge(m.t)+'<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+(m.prod?m.prod.name:'')+'</div><div style="font-size:10px;color:#94a3b8;font-family:monospace">'+m.dn+'</div></div><div style="font-weight:700;font-size:12px;color:'+(m.q<0?'#dc2626':'#16a34a')+';white-space:nowrap">'+(m.q>0?'+':'')+m.q+' buc</div></div>';}).join('')+'</div></div></div>'+
  '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">'+
  [{id:'rec',l:'📥 Recepție marfă',c:'#16a34a',bg:'#f0fdf4',bc:'#86efac'},{id:'liv',l:'📤 Livrare marfă',c:'#2563eb',bg:'#eff6ff',bc:'#93c5fd'},{id:'trf',l:'🔄 Transfer stoc',c:'#7c3aed',bg:'#f5f3ff',bc:'#c4b5fd'},{id:'adj',l:'⚖️ Ajustare stoc',c:'#ea580c',bg:'#fff7ed',bc:'#fdba74'}]
  .map(function(a){return'<button onclick="nav(\''+a.id+'\')" style="background:'+a.bg+';border:1px solid '+a.bc+';border-radius:10px;padding:12px;text-align:left;cursor:pointer;color:'+a.c+';font-weight:600;font-size:12px;font-family:inherit;width:100%">'+a.l+'</button>';}).join('')+'</div>';
}
// RECEPTION
function renderRec(){
  var pOpts=P.filter(function(p){return p.status==='active';}).map(function(p){return'<option value="'+p.id+'">'+p.code+' – '+p.name+'</option>';}).join('');

function showLot(lid){var l=L.find(function(x){return x.id===lid;});if(!l)return;var prod=P.find(function(p){return p.id===l.pid;});var st=lotStock(lid);var moves=M.filter(function(m){return m.lid===lid;}).sort(function(a,b){return new Date(a.ca)-new Date(b.ca);}).map(function(m){return Object.assign({},m,{loc:Loc.find(function(x){return x.id===m.locid;}),cli:C.find(function(x){return x.id===m.cid;})});});var byLoc=Loc.map(function(loc){return{loc:loc,qty:lotStock(lid,loc.id)};}).filter(function(x){return x.qty>0;});var det=document.getElementById('lot-detail');if(!det)return;det.style.display='block';det.innerHTML='<div class="ch" style="background:#eff6ff"><div><div style="font-weight:700;font-size:13px;color:#1e40af">📋 Fișă lot: '+l.code+'</div><div style="font-size:11px;color:#3b82f6">'+(prod?prod.name:'')+'</div></div><button class="btn" style="font-size:11px" onclick="document.getElementById(\'lot-detail\').style.display=\'none\'">× Închide</button></div><div class="cb"><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:13px">'+[['Stoc total',st+' buc'],['Baxuri',fmtBx(st,prod?prod.upb:1)],['Expirare',dFmt(l.ed)],['Qty inițială',(l.iq||0)+' buc']].map(function(s){return'<div style="background:#f8fafc;border-radius:8px;padding:10px 12px;border:1px solid #e2e8f0"><div style="font-size:10px;color:#64748b;text-transform:uppercase;font-weight:600">'+s[0]+'</div><div style="font-weight:700;font-size:15px;margin-top:2px">'+s[1]+'</div></div>';}).join('')+'</div>'+(byLoc.length?'<div style="margin-bottom:12px"><div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:5px">Stoc pe locații:</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+byLoc.map(function(s){return'<div style="background:#dbeafe;color:#1e40af;border-radius:20px;padding:4px 11px;font-size:11px;font-weight:600">'+s.loc.name+': '+s.qty+' buc</div>';}).join('')+'</div></div>':'')+

function histF(){var from=gv('h-from'),to=gv('h-to'),type=gv('h-type'),pid=gv('h-pid');var f=rMoves().filter(function(m){if(type&&m.t!==type)return false;if(pid&&m.pid!==pid)return false;if(from&&m.dd<from)return false;if(to&&m.dd>to)return false;return true;});si('h-tbl',histTable(f));var tI=f.filter(function(m){return m.q>0;}).reduce(function(s,m){return s+m.q;},0);var tO=f.filter(function(m){return m.q<0;}).reduce(function(s,m){return s+m.q;},0);si('h-sum','<span class="badge" style="background:#dcfce7;color:#166534">Intrări: +'+tI+' buc</span><span class="badge" style="background:#fee2e2;color:#991b1b;margin-left:6px">Ieșiri: '+tO+' buc</span>');var cnt=document.getElementById('h-cnt');if(cnt)cnt.textContent=f.length+' mișcări';}

  return'<div class="ph"><div><h1 style="font-size:18px;font-weight:700;margin:0">📈 Rapoarte</h1><p style="font-size:11px;color:#64748b;margin:2px 0 0">Analiză și export date stoc</p></div></div>'+
